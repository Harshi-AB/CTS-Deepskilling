# =====================================================================
# Exercise 09 - Customizing Data Source Configuration
# Externalized connection settings, the same idea as Spring Boot's
# application.properties (spring.datasource.*), just read by hand here
# since Spring Boot's auto-configuration machinery is not available.
# =====================================================================
db.url=jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=UTC
db.username=root
db.password=root
db.driver=com.mysql.cj.jdbc.Driver

# Custom connection-pool sizing (simulates HikariCP's pool-size settings)
db.pool.size=5
