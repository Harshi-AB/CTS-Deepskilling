# Spring Boot application configuration file
# Hands on 3 - Spring Core: Incorporate Logging

# Log level for all Spring Framework classes/packages
logging.level.org.springframework=info

# Log level for our own application package - set to debug so that we
# can see the detailed LOGGER.debug() statements added to the code
logging.level.com.cognizant.springlearn=debug

# Custom console log pattern:
#   %d{yyMMdd}                 -> date (yyMMdd)
#   %d{HH:mm:ss.SSS}            -> time with milliseconds
#   %-20.20thread               -> thread name, left padded/truncated to 20 chars
#   %5p                          -> log level, right aligned to 5 chars
#   %-25.25logger{25}            -> logger name, left padded/truncated to 25 chars
#   %25M                          -> method name, right aligned to 25 chars
#   %m%n                          -> log message + newline
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n

# Uncomment the line below only if the default Tomcat port (8080) is
# already in use on your machine.
# server.port=8081
